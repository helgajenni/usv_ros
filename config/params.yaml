# config/params.yaml
# Semua parameter disinkronkan dengan MATLAB reference implementation
# ================================================================

map:
  size: [33.0, 50.0]   # [yMax, xMax] dalam meter
  obstacles:
    - [10.0, 10.0, 0.25]
    - [20.0, 20.0, 0.25]
    - [30.0, 10.0, 0.25]
    - [40.0, 20.0, 0.25]
    - [17.0, 16.5, 0.25]
    - [41.0, 16.0, 0.25]

mission:
  start:    [1.0,  8.0]
  waypoint: [25.0, 20.0]
  goal:     [48.0, 13.0]

safety_margin:  1.5   # lebih besar dari display_margin=1.0 → path jelas di luar lingkaran visual
display_margin: 1.0

# ── USV Physical Model (Taylor 4-DOF, Identifikasi Baru) ─────────
usv:
  L: 1.6
  B: 0.4
  m: 11.8
  g: 9.81

  # Parameter Identifikasi A1-A22 (Model Baru — Surge, Sway, Yaw)
  # Relasi internal: A10 = (A1/A18)*A19, A11 = (1/A18)*A19
  A1:   1.5066
  A2:  -0.7405   # Redaman surge linier
  A3:   0.4219   # Redaman surge kuadratik (positif pada identifikasi ini)
  A4:  -0.1397   # Redaman surge kubik
  A5:  -0.1464   # Redaman sway linier
  A6:  -3.1952   # Redaman sway kuadratik
  A7:   4.1189   # Redaman sway kubik
  A8:   0.0000
  A9:   0.0000
  A10:  0.0845   # = (A1/A18)*A19 = (1.5066/0.0178)*0.001
  A11:  0.0561   # = (1/A18)*A19  = (1/0.0178)*0.001
  A12: -1.0495   # Redaman yaw linier
  A13:  1.4038   # Redaman yaw kuadratik
  A14: -2.0764   # Redaman yaw kubik
  A15:  0.0010
  A16:  0.9671   # Coupling |u|r → yaw (threshold instabilitas: u > 1.085 m/s)
  A17:  0.0021
  A18:  0.0178   # Koefisien gaya surge (TX → du)
  A19:  0.0010   # Koefisien gaya sway ke yaw (Fy → dr)
  A20:  0.0000
  A21:  0.0000
  A22:  0.0000

  # Parameter Model Roll (Identifikasi Baru — menggantikan A23-A27)
  KpLin:   0.0000   # Redaman roll linier (-KpLin * p)
  KpAbs:   0.0000   # Redaman roll kuadratik (-KpAbs * |p|p)
  KpCub:   0.0000   # Redaman roll kubik (-KpCub * |p|²p)
  Kphi:   13.5523   # Momen righting gravitasi (-Kphi * sin(phi))
  Kfy:    -0.0175   # Coupling gaya sway ke roll (Kfy * Fy)
  Kv:     -3.3096   # Coupling kecepatan sway ke roll (Kv * v)
  Kr:     -2.7576   # Coupling yaw rate ke roll (Kr * r)
  Kdelta:  0.1738   # Efek sudut kemudi ke roll (Kdelta * delta)
  Kbias:  -0.3631   # Bias roll konstan

  # Limit Aktuator (disesuaikan dengan parameter identifikasi baru)
  lims:
    TX:   200.0   # Berkurang: A18 baru 25× lebih besar → gaya surge jauh lebih kecil
    TY:    60.0   # Gaya sway (bow thruster) [N]
    TN:  1750.0   # Dinaikkan 50×: A19 baru 50× lebih kecil → TN perlu 50× lebih besar
    TK:     0.7   # Sudut kemudi delta [rad] ≈ ±40°
    dTX:  200.0   # Rate limiter surge [N/s]
    dTN:  7500.0  # Rate limiter yaw, proporsional dengan Kpsi_d=2000 [N/s]
    dTK:    5.0   # Rate limiter kemudi [rad/s]: rudder gerak lebih pelan

# ── RRT* Path Planning ────────────────────────────────────────────
rrt:
  maxIter:  800
  stepSize: 1.0
  goalBias: 0.15
  goalTol:  1.0
  rewireRad: 3.0

# ── Controller (ILOS + PID 4-DOF) ────────────────────────────────
ctrl:
  dt: 0.05

  # ILOS Guidance
  ILOS_Delta: 1.8     # 1.8 terlalu agresif (oscillasi); 2.0: ye_ss=0.14m
  ILOS_gamma: 0.5
  ILOS_kappa: 0.45

  # Surge PID — disesuaikan: A18 baru 25× lebih besar → gains turun ~25× agar koreksi setara
  # Efektif sama: A18_new * Ku_p_new * e_u ≈ A18_old * Ku_p_old * e_u
  Ku_p:  55.0
  Ku_i:   0.5
  Ku_d:   7.0

  # Yaw PID — disesuaikan: A19 baru 50× lebih kecil → gains naik 50× agar otoritas setara
  # Kpsi_d=2000: τ_yaw = 1/(A19·Kd − (A12+A16·u)) = 1/(2.0−0.208) = 0.558s
  # ye_ss = U·κ·delta/(A19·Kd−(A12+A16·u)) = 1.3×0.1×2.0/1.79 = 0.145m ✓
  # Kpsi_d>2000: koreksi heading lebih besar → r lebih besar → roll osilasi via Kr·r → CTE naik
  Kpsi_p: 2250.0   
  Kpsi_i:   75.0    
  Kpsi_d: 2000.0

  # Roll PID — TK = delta [rad]; gains dihitung untuk ζ=0.70, ωn=5 rad/s
  # ωn  = √(Kphi + Kdelta·Kphi_p) = √(13.5523 + 0.1738·65) = 5.0 rad/s
  # ζ   = Kdelta·Kphi_d / (2·ωn)  = 0.1738·40 / (2·5.0)    = 0.70
  Kphi_p: 120.0
  Kphi_i:  0.5
  Kphi_d: 80.0

  # Integrator limits (sesuai MATLAB intMax)
  intMax_u:   25.0
  intMax_psi:  8.0
  intMax_phi:  1.0   # Kphi_i·intMax = 0.5·1.0 = 0.5 rad (< TK_max=0.7 rad)

  # Misi
  WP_RADIUS:  4.0    # kurva WP mulai 2.5m sebelum WP; reset terjadi 1.5m sebelum kurva (aman)
  GOAL_TOL:   1.5    # 0.5→1.5: stop lebih awal sebelum overshoot goal
  fade_in:    4.0    # MATLAB: 4.0 detik ramp (bukan 1.5 yang lama)

  # Speed control (sesuai MATLAB)
  U0_target:      1.5
  U0_curv_thresh: 0.10   # Deteksi tikungan: radius < 8m
  U0_curv_speed:  1.1   # lebih lambat di tikungan: CTE_transient ∝ U, target <0.4m
  alpha_u:        0.15   # low-pass filter kecepatan